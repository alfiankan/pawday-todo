<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cat Kingdom is a cute idle town builder and cat hero battle game."
    />
    <title>Cat Kingdom</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <main class="game-shell" aria-label="Cat Kingdom web game">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">CK</span>
          <div>
            <p>cute cat colony builder</p>
            <h1>Cat Kingdom</h1>
          </div>
        </div>
        <div class="resource-strip" aria-label="Kingdom resources">
          <span id="fishCount">0 fish</span>
          <span id="woodCount">0 yarnwood</span>
          <span id="gemCount">0 moon gems</span>
        </div>
      </header>

      <section class="game-grid">
        <div class="canvas-wrap">
          <div id="game"></div>
        </div>

        <aside class="control-panel" aria-label="Game controls">
          <section class="panel-section compact">
            <div>
              <p class="kicker">townhall</p>
              <h2 id="townhallTitle">Townhall Lv. 1</h2>
            </div>
            <button id="collectButton" type="button">Gather Items</button>
          </section>

          <section class="panel-section">
            <p class="kicker">buildings</p>
            <div class="upgrade-list" id="buildingList"></div>
          </section>

          <section class="panel-section">
            <p class="kicker">cat heroes</p>
            <div class="hero-list" id="heroList"></div>
          </section>

          <section class="panel-section">
            <p class="kicker">quests</p>
            <div class="quest-list">
              <button id="forageButton" type="button">Find Item</button>
              <button id="battleButton" type="button">Cat Battle</button>
            </div>
            <p class="battle-note" id="battleNote">
              Upgrade heroes and buildings to protect the snack vault.
            </p>
          </section>

          <section class="panel-section log-section">
            <p class="kicker">kingdom log</p>
            <ol class="log-list" id="logList" aria-live="polite"></ol>
          </section>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
