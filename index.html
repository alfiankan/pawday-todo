<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pawday Todo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Pawday todo app">
      <section class="hero-panel">
        <div class="cat-badge" aria-hidden="true">
          <span class="ear ear-left"></span>
          <span class="ear ear-right"></span>
          <span class="face">
            <span class="eye"></span>
            <span class="eye"></span>
            <span class="nose"></span>
          </span>
        </div>
        <div>
          <p class="eyebrow">orangish little task den</p>
          <h1>Pawday Todo</h1>
          <p class="hero-copy">
            A soft, focused list for cat people who want their errands to feel
            a bit more sun-warmed.
          </p>
        </div>
      </section>

      <section class="todo-panel" aria-label="Todo list">
        <form class="task-form" id="taskForm">
          <label class="sr-only" for="taskInput">New task</label>
          <input
            id="taskInput"
            name="task"
            type="text"
            autocomplete="off"
            maxlength="90"
            placeholder="Add a tiny mission..."
          />
          <button type="submit" aria-label="Add task">+</button>
        </form>

        <div class="toolbar" aria-label="Todo controls">
          <div class="filters" role="group" aria-label="Filter tasks">
            <button class="filter is-active" type="button" data-filter="all">
              All
            </button>
            <button class="filter" type="button" data-filter="active">
              Active
            </button>
            <button class="filter" type="button" data-filter="done">
              Done
            </button>
          </div>
          <button class="clear-button" id="clearDone" type="button">
            Clear done
          </button>
        </div>

        <ul class="task-list" id="taskList" aria-live="polite"></ul>

        <div class="empty-state" id="emptyState">
          <div class="sleepy-cat" aria-hidden="true">
            <span class="tail"></span>
            <span class="body"></span>
            <span class="head"></span>
          </div>
          <p>No tasks here. The blanket is warm.</p>
        </div>

        <footer class="status-row">
          <span id="taskCount">0 tasks</span>
          <span>nap-friendly focus mode</span>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
