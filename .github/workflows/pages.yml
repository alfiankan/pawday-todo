name: Build and Deploy Godot Web

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Import Godot project
        run: docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace barichello/godot-ci:4.2.2 godot --headless --import --quit-after 30
      - name: Export web build
        run: |
          mkdir -p dist/web
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace barichello/godot-ci:4.2.2 godot --headless --export-release Web dist/web/index.html
          touch dist/web/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/web

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
